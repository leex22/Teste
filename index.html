<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard De Treinamento</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#005eb8', darkBg: '#0f172a', darkCard: '#1e293b' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .dropdown-content { display: none; position: absolute; z-index: 100; width: 100%; max-height: 350px; overflow-y: auto; border: 1px solid #cbd5e1; border-radius: 8px; background: white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .dark .dropdown-content { background: #1e293b; border-color: #475569; }
        .show { display: block; }
        input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
        select, input[type="date"], input[type="text"] { border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px; width: 100%; font-size: 0.875rem; background-color: inherit; }
        .dark select, .dark input { border-color: #475569; color: white; }
        .label-filter { font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 4px; display: block; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { background-color: #f8fafc; text-align: left; padding: 12px; font-weight: 700; color: #64748b; }
        .dark th { background-color: #334155; color: #cbd5e1; }
        td { padding: 10px 12px; border-bottom: 1px solid #e2e8f0; }
        .dark td { border-bottom-color: #334155; }
        .search-filter-input { position: sticky; top: 0; background: white; padding: 8px; z-index: 10; border-bottom: 1px solid #e2e8f0; }
        .dark .search-filter-input { background: #1e293b; border-bottom-color: #475569; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 dark:bg-darkBg dark:text-slate-100 p-4 md:p-8">

    <header class="max-w-7xl mx-auto mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-2xl font-bold text-primary dark:text-blue-400">📊 Dashboard de Treinamentos</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm">Gestão Operacional</p>
        </div>
        <div class="flex items-center gap-3">
            <label id="btnManual" class="hidden bg-amber-500 text-white px-4 py-2 rounded-lg cursor-pointer text-sm font-bold">
                ⚠️ Selecionar dados.xlsx
                <input type="file" id="fileInput" accept=".xlsx" class="hidden" onchange="handleManualFile(event)">
            </label>
            <button onclick="toggleTheme()" class="bg-slate-200 dark:bg-slate-700 p-2.5 rounded-lg">🌓</button>
        </div>
    </header>

    <main id="dashboardContent" class="max-w-7xl mx-auto hidden">
        <div id="pdfArea">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
                <div class="lg:col-span-2 bg-white dark:bg-darkCard p-5 rounded-xl shadow-sm border-t-4 border-primary">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="relative"><label class="label-filter">Método</label><button onclick="toggleDropdown('dropMethod')" id="btnMethod" class="bg-white dark:bg-slate-800 border p-2 rounded w-full text-left text-sm">Selecionar...</button><div id="dropMethod" class="dropdown-content"></div></div>
                        <div class="relative"><label class="label-filter">Curso</label><button onclick="toggleDropdown('dropCourse')" id="btnCourse" class="bg-white dark:bg-slate-800 border p-2 rounded w-full text-left text-sm">Selecionar...</button><div id="dropCourse" class="dropdown-content"></div></div>
                        <div class="relative"><label class="label-filter">Facilitador</label><button onclick="toggleDropdown('dropFac')" id="btnFac" class="bg-white dark:bg-slate-800 border p-2 rounded w-full text-left text-sm">Selecionar...</button><div id="dropFac" class="dropdown-content"></div></div>
                    </div>
                </div>
                <div class="bg-white dark:bg-darkCard p-5 rounded-xl shadow-sm border-t-4 border-amber-500 text-center">
                    <p class="text-xs font-bold text-slate-400 uppercase">Concluídos</p>
                    <h2 class="text-3xl font-bold text-green-600" id="kpiCompleted">0</h2>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <div class="bg-white dark:bg-darkCard p-6 rounded-xl shadow-sm h-96">
                    <h3 class="font-bold text-sm uppercase mb-4">🏆 Top 5 Treinamentos</h3>
                    <div class="h-80"><canvas id="chartCourses"></canvas></div>
                </div>
                <div class="bg-white dark:bg-darkCard p-6 rounded-xl shadow-sm h-96">
                    <h3 class="font-bold text-sm uppercase mb-4">👤 Top 5 Facilitadores</h3>
                    <div class="h-80"><canvas id="chartFacilitators"></canvas></div>
                </div>
            </div>
        </div>
    </main>

    <div id="noData" class="max-w-md mx-auto mt-32 text-center">
        <div class="animate-spin text-4xl mb-4 text-primary">⏳</div>
        <h2 class="text-xl font-bold">A carregar dados...</h2>
    </div>

    <script>
        Chart.register(ChartDataLabels);
        let rawData = [], charts = {}, selectedFilters = { methods: [], courses: [], facilitators: [] };
        let cols = { name: 'Name', course: 'Course Name', status: 'STATUS', facilitator: 'Partnership Facilitator', method: 'Training Method', date: 'ACTIVITY_DATE_TIME' };

        window.onload = carregarBaseAutomatica;

        async function carregarBaseAutomatica() {
            try {
                let response = await fetch('dados.xlsx');
                if (!response.ok) throw new Error();
                processData(await response.arrayBuffer());
            } catch (e) {
                // Se o navegador bloquear, mostra o botão para o utilizador clicar
                document.getElementById('noData').innerHTML = `
                    <h2 class='text-red-500 font-bold'>Ação Necessária</h2>
                    <p class='text-sm text-slate-500 mb-4'>O navegador bloqueou o acesso automático ao ficheiro.</p>
                    <button onclick="document.getElementById('fileInput').click()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold">Clique aqui para abrir 'dados.xlsx'</button>
                `;
            }
        }

        function handleManualFile(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => processData(e.target.result);
                reader.readAsArrayBuffer(file);
            }
        }

        function processData(buffer) {
            const workbook = XLSX.read(new Uint8Array(buffer), { type: 'array', cellDates: true });
            rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
            if(rawData.length > 0) {
                cols.status = ('ACTIVITY_CODE' in rawData[0]) ? 'ACTIVITY_CODE' : 'STATUS';
                document.getElementById('noData').classList.add('hidden');
                document.getElementById('dashboardContent').classList.remove('hidden');
                initDashboard();
            }
        }

        function toggleTheme() { document.documentElement.classList.toggle('dark'); updateDashboard(); }
        function toggleDropdown(id) { document.getElementById(id).classList.toggle('show'); }

        function initDashboard() {
            renderDropdown('dropMethod', 'methods', [...new Set(rawData.map(i => i[cols.method]))].sort());
            updateDashboard();
        }

        function renderDropdown(elementId, filterKey, options) {
            const container = document.getElementById(elementId);
            container.innerHTML = options.filter(o => o).map(opt => `
                <div class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 cursor-pointer text-sm" onclick="toggleFilter('${filterKey}', '${opt}')">
                    <input type="checkbox" ${selectedFilters[filterKey].includes(opt) ? 'checked' : ''}> ${opt}
                </div>
            `).join('');
        }

        function toggleFilter(key, val) {
            const idx = selectedFilters[key].indexOf(val);
            if(idx > -1) selectedFilters[key].splice(idx, 1);
            else selectedFilters[key].push(val);
            updateDashboard();
        }

        function updateDashboard() {
            const filtered = rawData.filter(i => (selectedFilters.methods.length === 0 || selectedFilters.methods.includes(i[cols.method])));
            document.getElementById('kpiCompleted').textContent = filtered.filter(i => i[cols.status] === 'Completed').length;
            renderCharts(filtered);
        }

        function renderCharts(d) {
            const isDark = document.documentElement.classList.contains('dark');
            
            // Gráfico de Cursos
            const cCounts = {}; d.forEach(i => { if(i[cols.status]==='Completed') cCounts[i[cols.course]] = (cCounts[i[cols.course]]||0)+1; });
            const topC = Object.keys(cCounts).sort((a,b)=>cCounts[b]-cCounts[a]).slice(0,5);
            
            updateChart('chartCourses', 'bar', {
                labels: topC.map(n => n.substring(0,12)),
                datasets: [{ data: topC.map(c => cCounts[c]), backgroundColor: '#005eb8' }]
            }, {
                indexAxis: 'y',
                plugins: {
                    datalabels: { 
                        color: '#FFFFFF', // <--- FONTE BRANCA FIXA PARA MODO LIGHT E DARK
                        font: { weight: 'bold' } 
                    }
                }
            });

            // Gráfico Facilitadores
            const facCounts = {}; d.forEach(i => { if(i[cols.status]==='Completed') facCounts[i[cols.facilitator]] = (facCounts[i[cols.facilitator]]||0)+1; });
            const fL = Object.keys(facCounts).sort((a,b)=>facCounts[b]-facCounts[a]).slice(0,5);
            updateChart('chartFacilitators', 'bar', {
                labels: fL,
                datasets: [{ data: fL.map(l => facCounts[l]), backgroundColor: '#10b981' }]
            }, {
                plugins: { datalabels: { color: isDark ? '#fff' : '#444' } }
            });
        }

        function updateChart(id, type, data, options) {
            if (charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), { type, data, options: { ...options, maintainAspectRatio: false } });
        }
    </script>
</body>
</html>
