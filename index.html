<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Treinamentos & Cobertura</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .dropdown-content { display: none; position: absolute; z-index: 100; width: 100%; max-height: 300px; overflow-y: auto; border: 1px solid #cbd5e1; border-radius: 8px; background: white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .show { display: block; }
        .dark .dropdown-content { background: #1e293b; border-color: #475569; }
        #authOverlay { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { background-color: #f8fafc; text-align: left; padding: 12px; font-weight: 700; color: #64748b; }
        .dark th { background-color: #334155; color: #cbd5e1; }
        td { padding: 10px 12px; border-bottom: 1px solid #e2e8f0; }
        .dark td { border-bottom-color: #334155; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 dark:bg-slate-900 dark:text-slate-100 p-4 md:p-8">

    <div id="authOverlay">
        <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-sm text-center dark:bg-slate-800">
            <h2 class="text-2xl font-bold mb-4">Acesso Restrito</h2>
            <input type="password" id="passInput" placeholder="Senha" class="w-full p-3 border rounded-lg mb-4 text-center dark:bg-slate-700" onkeypress="if(event.key==='Enter') checkAuth()">
            <button onclick="checkAuth()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Entrar</button>
        </div>
    </div>

    <main id="dashboardContent" class="max-w-7xl mx-auto hidden">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-blue-600">📊 Matriz de Cobertura FCP</h1>
            <button onclick="location.reload()" class="text-xs bg-slate-200 dark:bg-slate-700 px-3 py-1 rounded">Atualizar Dados</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="relative">
                <label class="text-[10px] font-bold uppercase text-slate-500">Função</label>
                <button onclick="toggleDropdown('dropRole')" id="btnRole" class="bg-white dark:bg-slate-800 border p-2 w-full rounded text-left text-sm flex justify-between"><span>Todos</span> ▾</button>
                <div id="dropRole" class="dropdown-content"></div>
            </div>
            <div class="relative">
                <label class="text-[10px] font-bold uppercase text-slate-500">Cluster</label>
                <button onclick="toggleDropdown('dropCluster')" id="btnCluster" class="bg-white dark:bg-slate-800 border p-2 w-full rounded text-left text-sm flex justify-between"><span>Todos</span> ▾</button>
                <div id="dropCluster" class="dropdown-content"></div>
            </div>
            <div class="relative">
                <label class="text-[10px] font-bold uppercase text-slate-500">Curso para Análise</label>
                <button onclick="toggleDropdown('dropCourse')" id="btnCourse" class="bg-white dark:bg-slate-800 border p-2 w-full rounded text-left text-sm flex justify-between"><span>Selecionar Curso...</span> ▾</button>
                <div id="dropCourse" class="dropdown-content"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Público-Alvo</p>
                <h2 class="text-2xl font-bold" id="kpiTotal">0</h2>
            </div>
            <div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border-l-4 border-green-500">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Concluídos</p>
                <h2 class="text-2xl font-bold" id="kpiDone">0</h2>
            </div>
            <div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border-l-4 border-red-500">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Pendentes</p>
                <h2 class="text-2xl font-bold" id="kpiGap">0</h2>
            </div>
            <div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border-l-4 border-purple-500">
                <p class="text-[10px] font-bold text-slate-400 uppercase">% Cobertura</p>
                <h2 class="text-2xl font-bold" id="kpiRate">0%</h2>
            </div>
        </div>

        <div class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm mb-6">
            <h3 class="text-sm font-bold mb-4 uppercase">Lista de Gap (Quem falta treinar)</h3>
            <div class="overflow-x-auto">
                <table id="mainTable">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Email</th>
                            <th>Função</th>
                            <th>Cluster</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="statusMsg" class="mt-20 text-center text-slate-400">Carregando arquivos...</div>

    <script>
        const SENHA = "1234";
        let globalStaff = [], globalTrain = [], filters = { roles: [], clusters: [], courses: [] };

        function checkAuth() {
            if (document.getElementById('passInput').value === SENHA) {
                sessionStorage.setItem("auth", "true");
                document.getElementById('authOverlay').style.display = 'none';
            }
        }

        // Função para ler arquivo Excel remoto
        async function fetchExcel(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`Não foi possível encontrar o arquivo: ${url}`);
            const arrayBuffer = await res.arrayBuffer();
            const workbook = XLSX.read(arrayBuffer, { type: 'array' });
            return XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
        }

        function getVal(obj, keys) {
            for (let k of keys) {
                const found = Object.keys(obj).find(key => key.trim().toLowerCase() === k.toLowerCase());
                if (found) return obj[found];
            }
            return "";
        }

        async function init() {
            try {
                const [staffData, trainData] = await Promise.all([
                    fetchExcel('FCP staff.xlsx'),
                    fetch('dados.csv').then(r => r.text()).then(t => XLSX.utils.sheet_to_json(XLSX.read(t, {type:'string'}).Sheets.Sheet1))
                ]);

                globalStaff = staffData.map(s => ({
                    nome: `${getVal(s, ['First Name'])} ${getVal(s, ['Last Name'])}`.trim(),
                    email: String(getVal(s, ['Email'])).trim().toLowerCase(),
                    role: getVal(s, ['Role At FCP', 'Role']),
                    cluster: getVal(s, ['FCP Cluster', 'Cluster'])
                })).filter(i => i.email);

                globalTrain = trainData.map(t => ({
                    email: String(getVal(t, ['Email'])).trim().toLowerCase(),
                    curso: getVal(t, ['Course Name', 'Course']),
                    status: getVal(t, ['ACTIVITY_CODE', 'Status'])
                })).filter(i => i.email);

                populateFilters();
                update();
                
                document.getElementById('statusMsg').classList.add('hidden');
                document.getElementById('dashboardContent').classList.remove('hidden');
            } catch (e) {
                document.getElementById('statusMsg').innerHTML = `<p class="text-red-500">Erro: ${e.message}<br>Verifique se os arquivos FCP staff.xlsx e dados.csv estão na pasta.</p>`;
            }
        }

        function populateFilters() {
            const createItems = (id, key, list) => {
                document.getElementById(id).innerHTML = [...new Set(list)].filter(Boolean).sort().map(opt => `
                    <div class="p-2 text-xs hover:bg-slate-100 dark:hover:bg-slate-700 cursor-pointer flex gap-2">
                        <input type="checkbox" onchange="handleF('${key}', '${opt.replace(/'/g, "\\'")}')"> ${opt}
                    </div>`).join('');
            };
            createItems('dropRole', 'roles', globalStaff.map(s => s.role));
            createItems('dropCluster', 'clusters', globalStaff.map(s => s.cluster));
            createItems('dropCourse', 'courses', globalTrain.map(t => t.curso));
        }

        function handleF(key, val) {
            const idx = filters[key].indexOf(val);
            if(idx > -1) filters[key].splice(idx, 1); else filters[key].push(val);
            update();
        }

        function toggleDropdown(id) {
            document.querySelectorAll('.dropdown-content').forEach(d => d.id !== id && d.classList.remove('show'));
            document.getElementById(id).classList.toggle('show');
        }

        function update() {
            const target = globalStaff.filter(s => 
                (filters.roles.length === 0 || filters.roles.includes(s.role)) &&
                (filters.clusters.length === 0 || filters.clusters.includes(s.cluster))
            );

            const conclusoes = new Set(globalTrain.filter(t => 
                ['Completed', 'Attended', 'Concluído'].includes(t.status) &&
                (filters.courses.length === 0 || filters.courses.includes(t.curso))
            ).map(t => t.email));

            const treinados = target.filter(s => conclusoes.has(s.email));
            
            document.getElementById('kpiTotal').innerText = target.length;
            document.getElementById('kpiDone').innerText = treinados.length;
            document.getElementById('kpiGap').innerText = target.length - treinados.length;
            document.getElementById('kpiRate').innerText = target.length > 0 ? Math.round((treinados.length / target.length)*100) + '%' : '0%';

            document.getElementById('tableBody').innerHTML = target.map(s => `
                <tr class="${conclusoes.has(s.email) ? 'opacity-50' : 'bg-red-50 dark:bg-red-900/10'}">
                    <td>${s.nome}</td>
                    <td>${s.email}</td>
                    <td>${s.role}</td>
                    <td>${s.cluster}</td>
                    <td><span class="font-bold ${conclusoes.has(s.email) ? 'text-green-500' : 'text-red-500'}">
                        ${conclusoes.has(s.email) ? 'CONCLUÍDO' : 'PENDENTE'}
                    </span></td>
                </tr>`).join('');
        }

        window.onload = () => {
            if (sessionStorage.getItem("auth") === "true") document.getElementById('authOverlay').style.display = 'none';
            init();
        };
    </script>
</body>
</html>
