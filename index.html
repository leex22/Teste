<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard De Treinamento</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#005eb8', darkBg: '#0f172a', darkCard: '#1e293b' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .dropdown-content { display: none; position: absolute; z-index: 100; width: 100%; max-height: 350px; overflow-y: auto; border: 1px solid #cbd5e1; border-radius: 8px; background: white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .dark .dropdown-content { background: #1e293b; border-color: #475569; }
        .show { display: block; }
        .dropdown-item:hover { background-color: #f1f5f9; }
        .dark .dropdown-item:hover { background-color: #334155; }
        input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
        select, input[type="date"], input[type="text"] { border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px; width: 100%; font-size: 0.875rem; background-color: inherit; }
        .dark select, .dark input { border-color: #475569; color: white; }
        .label-filter { font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 4px; display: block; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { background-color: #f8fafc; text-align: left; padding: 12px; font-weight: 700; color: #64748b; }
        .dark th { background-color: #334155; color: #cbd5e1; }
        td { padding: 10px 12px; border-bottom: 1px solid #e2e8f0; }
        .dark td { border-bottom-color: #334155; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 dark:bg-darkBg dark:text-slate-100 p-4 md:p-8">

    <header class="max-w-7xl mx-auto mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-2xl font-bold text-primary dark:text-blue-400">📊 Dashboard de Treinamentos</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm">Selecione o arquivo Excel para iniciar</p>
        </div>
        <div class="flex items-center gap-3">
            <label class="bg-blue-600 text-white px-4 py-2.5 rounded-lg hover:bg-blue-700 transition shadow-md font-medium text-sm cursor-pointer">
                <span>📁 Abrir Excel</span>
                <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" class="hidden" onchange="handleFileUpload(event)">
            </label>
            <button onclick="toggleTheme()" class="bg-slate-200 dark:bg-slate-700 p-2.5 rounded-lg">🌓</button>
        </div>
    </header>

    <main id="dashboardContent" class="max-w-7xl mx-auto hidden">
        <div id="pdfArea">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
                <div class="lg:col-span-2 bg-white dark:bg-darkCard p-5 rounded-xl shadow-sm border-t-4 border-primary">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-sm font-bold uppercase tracking-wider">🔍 Filtros Inteligentes</h3>
                        <button onclick="resetAllFilters()" class="text-[10px] bg-red-100 text-red-600 px-2 py-1 rounded font-bold uppercase">Limpar Filtros</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <div class="relative"><label class="label-filter">Método</label><button onclick="toggleDropdown('dropMethod')" id="btnMethod" class="bg-white dark:bg-slate-800 border p-2 rounded w-full text-left text-sm">Selecionar...</button><div id="dropMethod" class="dropdown-content"></div></div>
                        <div class="relative"><label class="label-filter">Curso</label><button onclick="toggleDropdown('dropCourse')" id="btnCourse" class="bg-white dark:bg-slate-800 border p-2 rounded w-full text-left text-sm">Selecionar...</button><div id="dropCourse" class="dropdown-content"></div></div>
                        <div class="relative"><label class="label-filter">Facilitador</label><button onclick="toggleDropdown('dropFac')" id="btnFac" class="bg-white dark:bg-slate-800 border p-2 rounded w-full text-left text-sm">Selecionar...</button><div id="dropFac" class="dropdown-content"></div></div>
                        <div id="statusFilterContainer" class="hidden"><label class="label-filter">Status</label><select id="filterStatus" onchange="updateDashboard()"><option value="all">Todos</option><option value="Completed">Concluído</option><option value="Enrolled">Inscrito</option></select></div>
                    </div>
                </div>
                <div class="bg-white dark:bg-darkCard p-5 rounded-xl shadow-sm border-t-4 border-amber-500">
                    <h3 class="text-sm font-bold mb-4 uppercase">📅 Período</h3>
                    <input type="date" id="dateStart" onchange="updateDashboard()" class="mb-2">
                    <input type="date" id="dateEnd" onchange="updateDashboard()">
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="bg-white dark:bg-darkCard p-5 rounded-xl border-b-4 border-blue-600 shadow-sm text-center"><p class="text-xs font-bold text-slate-400 uppercase">Concluídos</p><h2 class="text-2xl font-bold text-green-600" id="kpiCompleted">0</h2></div>
                <div class="bg-white dark:bg-darkCard p-5 rounded-xl border-b-4 border-purple-500 shadow-sm text-center"><p class="text-xs font-bold text-slate-400 uppercase">Taxa</p><h2 class="text-2xl font-bold text-purple-600" id="kpiRate">0%</h2></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <div class="bg-white dark:bg-darkCard p-6 rounded-xl shadow-sm h-96" id="cardCourses">
                    <h3 class="font-bold text-sm uppercase mb-4">🏆 Top 5 Treinamentos</h3>
                    <div class="h-80"><canvas id="chartCourses"></canvas></div>
                </div>
                <div class="bg-white dark:bg-darkCard p-6 rounded-xl shadow-sm h-96" id="cardFacilitators">
                    <h3 class="font-bold text-sm uppercase mb-4">👤 Top 5 Facilitadores (CBT)</h3>
                    <div class="h-80"><canvas id="chartFacilitators"></canvas></div>
                </div>
            </div>
        </div>
    </main>

    <div id="noData" class="max-w-md mx-auto mt-32 text-center">
        <div class="text-6xl mb-6">📂</div>
        <h2 class="text-xl font-bold">Aguardando arquivo...</h2>
        <p class="text-slate-500 mt-2">Clique no botão "Abrir Excel" acima para carregar os dados.</p>
    </div>

    <script>
        Chart
