<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCP Strategy Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/papaparse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#005eb8', darkBg: '#0f172a', darkCard: '#1e293b' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; }
        .chart-container { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-darkBg text-gray-900 dark:text-gray-100 min-h-screen">

    <header class="bg-white dark:bg-darkCard shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-bold text-primary">FCP Operational Excellence</h1>
            <div class="flex gap-2">
                <button onclick="document.body.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌓</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="p-6 bg-white dark:bg-darkCard rounded-xl shadow-sm border border-gray-200 dark:border-gray-700">
                <label class="block text-sm font-semibold mb-2">1. Base de Treinamentos (dados.csv)</label>
                <input type="file" id="fileTrainings" accept=".csv" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:bg-primary file:text-white hover:file:bg-blue-700">
            </div>
            <div class="p-6 bg-white dark:bg-darkCard rounded-xl shadow-sm border border-gray-200 dark:border-gray-700">
                <label class="block text-sm font-semibold mb-2">2. Base FCP Staff (cadastro.csv)</label>
                <input type="file" id="fileStaff" accept=".csv" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:bg-green-600 file:text-white hover:file:bg-green-700">
            </div>
        </div>

        <div id="filtersArea" class="hidden grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 p-4 bg-gray-100 dark:bg-gray-800 rounded-lg">
            <select id="filterCluster" class="p-2 rounded border dark:bg-gray-700 dark:border-gray-600" onchange="processData()">
                <option value="">Todos os Clusters</option>
            </select>
            <select id="filterRole" class="p-2 rounded border dark:bg-gray-700 dark:border-gray-600" onchange="processData()">
                <option value="">Todas as Funções</option>
            </select>
            <select id="filterSupervisor" class="p-2 rounded border dark:bg-gray-700 dark:border-gray-600" onchange="processData()">
                <option value="">Todos os Supervisores</option>
            </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white dark:bg-darkCard p-6 rounded-xl shadow-sm border-l-4 border-primary">
                <p class="text-sm text-gray-500 uppercase font-bold">Total Staff</p>
                <h3 id="kpiTotalStaff" class="text-3xl font-bold">0</h3>
            </div>
            <div class="bg-white dark:bg-darkCard p-6 rounded-xl shadow-sm border-l-4 border-green-500">
                <p class="text-sm text-gray-500 uppercase font-bold">Taxa de Cobertura</p>
                <h3 id="kpiCoverage" class="text-3xl font-bold">0%</h3>
            </div>
            <div class="bg-white dark:bg-darkCard p-6 rounded-xl shadow-sm border-l-4 border-yellow-500">
                <p class="text-sm text-gray-500 uppercase font-bold">Pendentes</p>
                <h3 id="kpiPending" class="text-3xl font-bold">0</h3>
            </div>
            <div class="bg-white dark:bg-darkCard p-6 rounded-xl shadow-sm border-l-4 border-red-500">
                <p class="text-sm text-gray-500 uppercase font-bold">Cursos Concluídos</p>
                <h3 id="kpiCompleted" class="text-3xl font-bold">0</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <div class="bg-white dark:bg-darkCard p-6 rounded-xl shadow-sm">
                <h4 class="font-bold mb-4">Gaps por Função (Role at FCP)</h4>
                <div class="chart-container"><canvas id="chartRoles"></canvas></div>
            </div>
            <div class="bg-white dark:bg-darkCard p-6 rounded-xl shadow-sm">
                <h4 class="font-bold mb-4">Engajamento por Cluster</h4>
                <div class="chart-container"><canvas id="chartClusters"></canvas></div>
            </div>
        </div>

        <div class="bg-white dark:bg-darkCard rounded-xl shadow-sm overflow-hidden border border-gray-200 dark:border-gray-700">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                <h4 class="font-bold">Público-Alvo (Pessoas sem nenhum treinamento)</h4>
                <button onclick="downloadPending()" class="text-sm bg-primary text-white px-3 py-1 rounded">Exportar CSV</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 dark:bg-gray-800 text-xs uppercase text-gray-500">
                        <tr>
                            <th class="p-4">Nome</th>
                            <th class="p-4">Email</th>
                            <th class="p-4">Função</th>
                            <th class="p-4">Cluster</th>
                        </tr>
                    </thead>
                    <tbody id="tablePendingBody" class="text-sm divide-y divide-gray-100 dark:divide-gray-700">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let rawTrainings = [];
        let rawStaff = [];
        let charts = {};

        // Listeners para os inputs de arquivo
        document.getElementById('fileTrainings').addEventListener('change', e => loadCSV(e.target.files[0], 'trainings'));
        document.getElementById('fileStaff').addEventListener('change', e => loadCSV(e.target.files[0], 'staff'));

        function loadCSV(file, type) {
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    if (type === 'trainings') rawTrainings = results.data;
                    else {
                        rawStaff = results.data;
                        populateFilters(results.data);
                    }
                    if (rawTrainings.length > 0 && rawStaff.length > 0) processData();
                }
            });
        }

        function populateFilters(data) {
            const clusters = [...new Set(data.map(i => i['FCP Cluster']).filter(Boolean))].sort();
            const roles = [...new Set(data.map(i => i['Role At FCP']).filter(Boolean))].sort();
            const supervisors = [...new Set(data.map(i => i['Partnership Facilitator Supervisor']).filter(Boolean))].sort();

            updateSelect('filterCluster', clusters);
            updateSelect('filterRole', roles);
            updateSelect('filterSupervisor', supervisors);
            document.getElementById('filtersArea').classList.remove('hidden');
        }

        function updateSelect(id, list) {
            const select = document.getElementById(id);
            const currentVal = select.value;
            select.innerHTML = `<option value="">Todos (${list.length})</option>`;
            list.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item;
                opt.textContent = item;
                select.appendChild(opt);
            });
            select.value = currentVal;
        }

        function processData() {
            const fCluster = document.getElementById('filterCluster').value;
            const fRole = document.getElementById('filterRole').value;
            const fSupervisor = document.getElementById('filterSupervisor').value;

            // 1. Filtrar a base de Staff (O Universo)
            const staffFiltered = rawStaff.filter(person => {
                return (!fCluster || person['FCP Cluster'] === fCluster) &&
                       (!fRole || person['Role At FCP'] === fRole) &&
                       (!fSupervisor || person['Partnership Facilitator Supervisor'] === fSupervisor);
            });

            // 2. Criar Map de treinamentos por Email
            const trainingMap = {};
            rawTrainings.forEach(t => {
                const email = t.Email?.toLowerCase().trim();
                if (!trainingMap[email]) trainingMap[email] = [];
                trainingMap[email].push(t);
            });

            // 3. Cruzamento Estratégico
            let trainedCount = 0;
            let totalCompletions = 0;
            let pendingList = [];

            staffFiltered.forEach(person => {
                const email = person.Email?.toLowerCase().trim();
                const personTrainings = trainingMap[email] || [];
                
                const completed = personTrainings.filter(t => ['Completed', 'Attended'].includes(t.ACTIVITY_CODE || t.Status));
                
                if (completed.length > 0) {
                    trainedCount++;
                    totalCompletions += completed.length;
                } else {
                    pendingList.push(person);
                }
            });

            // 4. Update KPIs
            document.getElementById('kpiTotalStaff').textContent = staffFiltered.length;
            document.getElementById('kpiCoverage').textContent = staffFiltered.length ? Math.round((trainedCount / staffFiltered.length) * 100) + '%' : '0%';
            document.getElementById('kpiPending').textContent = pendingList.length;
            document.getElementById('kpiCompleted').textContent = totalCompletions;

            // 5. Renderizar Gráficos e Tabela
            renderCharts(staffFiltered, trainingMap);
            renderTable(pendingList);
        }

        function renderCharts(staff, tMap) {
            // Lógica para Gap por Função
            const rolesData = {};
            staff.forEach(p => {
                const r = p['Role At FCP'] || 'Indefinido';
                if (!rolesData[r]) rolesData[r] = { total: 0, trained: 0 };
                rolesData[r].total++;
                if (tMap[p.Email?.toLowerCase().trim()]?.some(t => ['Completed', 'Attended'].includes(t.ACTIVITY_CODE))) {
                    rolesData[r].trained++;
                }
            });

            updateChart('chartRoles', 'bar', {
                labels: Object.keys(rolesData),
                datasets: [
                    { label: 'Treinados', data: Object.values(rolesData).map(v => v.trained), backgroundColor: '#005eb8' },
                    { label: 'Total Staff', data: Object.values(rolesData).map(v => v.total), backgroundColor: '#e2e8f0' }
                ]
            }, { indexAxis: 'y', stacked: false });

            // Lógica por Cluster
            const clusterData = {};
            staff.forEach(p => {
                const c = p['FCP Cluster'] || 'Outros';
                if (!clusterData[c]) clusterData[c] = { total: 0, trained: 0 };
                clusterData[c].total++;
                if (tMap[p.Email?.toLowerCase().trim()]?.some(t => ['Completed', 'Attended'].includes(t.ACTIVITY_CODE))) {
                    clusterData[c].trained++;
                }
            });

            updateChart('chartClusters', 'doughnut', {
                labels: Object.keys(clusterData),
                datasets: [{
                    data: Object.values(clusterData).map(v => v.trained),
                    backgroundColor: ['#005eb8', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6']
                }]
            });
        }

        function renderTable(list) {
            const tbody = document.getElementById('tablePendingBody');
            tbody.innerHTML = list.slice(0, 50).map(p => `
                <tr class="hover:bg-gray-50 dark:hover:bg-gray-800">
                    <td class="p-4 font-medium">${p['First Name'] || ''} ${p['Last Name'] || ''}</td>
                    <td class="p-4">${p.Email || '-'}</td>
                    <td class="p-4 text-xs bg-gray-100 dark:bg-gray-700 rounded px-2 py-1">${p['Role At FCP'] || '-'}</td>
                    <td class="p-4">${p['FCP Cluster'] || '-'}</td>
                </tr>
            `).join('');
        }

        function updateChart(id, type, data, options = {}) {
            if (charts[id]) charts[id].destroy();
            const ctx = document.getElementById(id).getContext('2d');
            charts[id] = new Chart(ctx, {
                type,
                data,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { position: 'bottom', labels: { color: document.body.classList.contains('dark') ? '#fff' : '#666' } }
                    },
                    ...options
                }
            });
        }

        function downloadPending() {
            // Implementação simples de CSV download pode ser adicionada aqui
            alert('Gerando lista de pendências para download...');
        }
    </script>
</body>
</html>
