<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Estratégico de Treinamentos</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#005eb8', darkBg: '#0f172a', darkCard: '#1e293b' } } }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .dropdown-content { display: none; position: absolute; z-index: 100; width: 100%; max-height: 300px; overflow-y: auto; border: 1px solid #cbd5e1; border-radius: 8px; background: white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); min-width: 200px; }
        .dark .dropdown-content { background: #1e293b; border-color: #475569; }
        .show { display: block; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
            70% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .glow-red { animation: pulse-red 2s infinite; border-color: #ef4444 !important; }
        .semaforo-verde { color: #10b981 !important; }
        .semaforo-amarelo { color: #f59e0b !important; }
        .semaforo-vermelho { color: #ef4444 !important; }
        #authOverlay, #loadingOverlay { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; color: white; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.3); width: 40px; height: 40px; border-radius: 50%; border-left-color: #fff; animation: spin 1s linear infinite; margin-bottom: 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th { background: #f8fafc; padding: 10px; text-align: left; position: sticky; top: 0; }
        .dark th { background: #334155; }
        td { padding: 8px 10px; border-bottom: 1px solid #e2e8f0; }
        .dark td { border-bottom-color: #334155; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 dark:bg-darkBg dark:text-slate-100 p-4 md:p-8">

    <div id="authOverlay">
        <div class="bg-white text-slate-900 p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold mb-4">Dashboard FCP</h2>
            <input type="password" id="passInput" placeholder="Senha" class="border p-3 w-full mb-4 text-center text-2xl rounded-lg" onkeypress="if(event.key==='Enter') window.efetuarLogin()">
            <button onclick="window.efetuarLogin()" class="bg-primary text-white w-full py-3 rounded-lg font-bold">Aceder</button>
            <p id="authError" class="text-red-500 text-sm mt-2 hidden">Senha incorreta.</p>
        </div>
    </div>

    <div id="loadingOverlay" style="display: none;">
        <div class="spinner"></div>
        <h2 class="text-xl font-bold">A carregar bases de dados...</h2>
        <p id="loadingStatus" class="text-xs text-slate-400 mt-2"></p>
    </div>

    <header class="max-w-7xl mx-auto mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-primary dark:text-blue-400">📊 Estratégia de Treinamentos</h1>
            <span id="metaAtivaLabel" class="hidden px-2 py-0.5 bg-indigo-100 text-indigo-700 text-[10px] rounded font-bold">🎯 Meta Aplicada</span>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleTheme()" class="bg-slate-200 dark:bg-slate-700 p-2 rounded-lg">🌓</button>
        </div>
    </header>

    <main id="dashboardContent" class="max-w-7xl mx-auto hidden">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-6">
            <div class="lg:col-span-3 bg-white dark:bg-darkCard p-4 rounded-xl shadow-sm grid grid-cols-1 md:grid-cols-3 gap-3">
                <div class="relative"><label class="text-[10px] font-bold text-slate-400 uppercase">Curso</label><button onclick="toggleDropdown('dropCourse')" id="btnCourse" class="border p-2 w-full text-left text-sm rounded bg-transparent truncate">Selecionar...</button><div id="dropCourse" class="dropdown-content"></div></div>
                <div class="relative"><label class="text-[10px] font-bold text-slate-400 uppercase">Facilitador</label><button onclick="toggleDropdown('dropFac')" id="btnFac" class="border p-2 w-full text-left text-sm rounded bg-transparent truncate">Selecionar...</button><div id="dropFac" class="dropdown-content"></div></div>
                <div class="relative"><label class="text-[10px] font-bold text-slate-400 uppercase">Cargo</label><button onclick="toggleDropdown('dropRole')" id="btnRole" class="border p-2 w-full text-left text-sm rounded bg-transparent truncate">Selecionar...</button><div id="dropRole" class="dropdown-content"></div></div>
            </div>
            <div class="bg-white dark:bg-darkCard p-4 rounded-xl shadow-sm flex flex-col justify-center">
                <label class="text-[10px] font-bold text-slate-400 uppercase mb-1">Período</label>
                <div class="flex gap-2"><input type="date" id="dateStart" onchange="updateDashboard()" class="text-xs w-full"><input type="date" id="dateEnd" onchange="updateDashboard()" class="text-xs w-full"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white dark:bg-darkCard p-4 rounded-xl border-l-4 border-slate-700 shadow-sm text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase" id="lblTotalStaff">Total Alvo</p>
                <h2 class="text-2xl font-bold" id="kpiTotalStaff">0</h2>
            </div>
            <div id="cardKpiCoverage" class="bg-white dark:bg-darkCard p-4 rounded-xl border-l-4 border-teal-500 shadow-sm text-center transition-all">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Cobertura (Staff)</p>
                <h2 class="text-2xl font-bold" id="kpiCoverage">0%</h2>
                <p id="kpiCoverageMeta" class="text-[9px] font-bold mt-1 hidden"></p>
            </div>
            <div class="bg-white dark:bg-darkCard p-4 rounded-xl border-l-4 border-indigo-500 shadow-sm text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Total Inscritos</p>
                <h2 class="text-2xl font-bold text-indigo-600" id="kpiTotal">0</h2>
            </div>
            <div id="cardKpiRate" class="bg-white dark:bg-darkCard p-4 rounded-xl border-l-4 border-purple-500 shadow-sm text-center transition-all">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Eficiência</p>
                <h2 class="text-2xl font-bold" id="kpiRate">0%</h2>
                <p id="kpiRateMeta" class="text-[9px] font-bold mt-1 hidden"></p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <div class="bg-white dark:bg-darkCard p-6 rounded-xl shadow-sm h-80"><canvas id="chartCourses"></canvas></div>
            <div class="bg-white dark:bg-darkCard p-6 rounded-xl shadow-sm h-80"><canvas id="chartFacilitadores"></canvas></div>
        </div>

        <section class="bg-white dark:bg-darkCard p-6 rounded-xl shadow-sm overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-sm uppercase">📋 Detalhes</h3>
                <input type="text" id="tableSearch" placeholder="Pesquisar..." onkeyup="renderTable()" class="border p-1.5 text-xs rounded w-64">
            </div>
            <div class="overflow-x-auto max-h-96">
                <table id="mainTable">
                    <thead><tr><th>FCP ID</th><th>Nome</th><th>Cargo</th><th>Curso</th><th>Status</th><th>Data</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        window.efetuarLogin = function() {
            if (document.getElementById('passInput').value === "1234") {
                sessionStorage.setItem("dashboard_auth", "true");
                document.getElementById('authOverlay').style.display = 'none';
                carregarBasesAutomaticamente();
            } else { document.getElementById('authError').classList.remove('hidden'); }
        };

        window.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem("dashboard_auth") === "true") {
                document.getElementById('authOverlay').style.display = 'none';
                carregarBasesAutomaticamente();
            }
        });

        function toggleTheme() { document.documentElement.classList.toggle('dark'); updateDashboard(); }
        function toggleDropdown(id) { 
            document.querySelectorAll('.dropdown-content').forEach(d => { if(d.id !== id) d.classList.remove('show'); });
            document.getElementById(id).classList.toggle('show'); 
        }
        window.onclick = (e) => { if(!e.target.closest('.relative')) document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show')); };

        Chart.register(ChartDataLabels);
        var baseTraining = [], baseStaff = [], baseMetas = [], joinedData = [], currentFilteredData = [], charts = {};
        var selectedFilters = { roles: [], courses: [], facs: [] };
        var cols = { email: 'Email', course: 'Course Name', status: 'ACTIVITY_CODE', date: 'ACTIVITY_DATE_TIME', fac: 'Partnership Facilitator', staffRole: 'Staff_Role', staffFcp: 'FCP ID' };

        async function fetchFile(names) {
            for (let name of names) {
                try {
                    document.getElementById('loadingStatus').innerText = "A procurar " + name + "...";
                    let res = await fetch(name);
                    if (res.ok) return await res.arrayBuffer();
                } catch(e) {}
            }
            return null;
        }

        async function carregarBasesAutomaticamente() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            let bT = await fetchFile(['dados.csv','dados.xlsx','Dados.csv','Dados.xlsx','DADOS.csv','DADOS.xlsx']);
            let bS = await fetchFile(['FCP staff.csv','FCP staff.xlsx','FCP Staff.csv','FCP Staff.xlsx','FCP_Staff.csv','FCP_Staff.xlsx','fcp_staff.csv']);
            let bM = await fetchFile(['metas.xlsx','metas.csv','Metas.xlsx','Metas.csv','METAS.xlsx','METAS.csv']);

            if (!bT || !bS) { alert("Erro ao carregar arquivos base. Verifique os nomes no GitHub."); return; }

            baseTraining = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(bT), {type:'array', cellDates:true}).Sheets[XLSX.read(new Uint8Array(bT), {type:'array'}).SheetNames[0]], {defval:""});
            baseStaff = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(bS), {type:'array', cellDates:true}).Sheets[XLSX.read(new Uint8Array(bS), {type:'array'}).SheetNames[0]], {defval:""});
            if(bM) baseMetas = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(bM), {type:'array'}).Sheets[XLSX.read(new Uint8Array(bM), {type:'array'}).SheetNames[0]], {defval:""});

            let staffDict = {};
            baseStaff.forEach(s => { let em = String(s['Email']||'').trim().toLowerCase(); if(em) staffDict[em] = s; });

            joinedData = baseTraining.map(t => {
                let em = String(t['Email']||t['EMAIL']||'').trim().toLowerCase();
                let s = staffDict[em] || {};
                return {
                    ...t, Email_Lower: em,
                    [cols.status]: t['ACTIVITY_CODE'] || t['STATUS'] || '',
                    [cols.date]: t['ACTIVITY_DATE_TIME'] || '',
                    [cols.course]: t['Course Name'] || '',
                    [cols.fac]: t['Partnership Facilitator'] || 'Não Atribuído',
                    [cols.staffRole]: s['Role At FCP'] || s['Role at FCP'] || 'Não Identificado',
                    [cols.staffFcp]: s['FCP ID'] || 'N/A',
                    NameDisplay: s['First Name'] ? (s['First Name']+' '+(s['Last Name']||'')) : (t['Name']||em)
                };
            });

            const getU = (key) => [...new Set(joinedData.map(i => i[key]))].filter(x => x && x !== "").sort();
            renderDropdown('dropCourse', 'courses', getU(cols.course));
            renderDropdown('dropFac', 'facs', getU(cols.fac));
            renderDropdown('dropRole', 'roles', getU(cols.staffRole));

            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('dashboardContent').classList.remove('hidden');
            updateDashboard();
        }

        // FUNÇÕES DE DROPDOWN CORRIGIDAS
        function renderDropdown(id, key, options) {
            let container = document.getElementById(id);
            container.innerHTML = options.map(opt => `
                <div class="dropdown-item p-2 text-xs flex items-center gap-2 hover:bg-slate-100 dark:hover:bg-slate-700 cursor-pointer" onclick="handleFilterClick(event, '${key}', '${opt}')">
                    <input type="checkbox" value="${opt}" class="filter-cb-${key}" onclick="event.stopPropagation()">
                    <span class="truncate">${opt}</span>
                </div>
            `).join('');
        }

        function handleFilterClick(e, key, val) {
            let cb = e.currentTarget.querySelector('input');
            cb.checked = !cb.checked;
            if(cb.checked) selectedFilters[key].push(val);
            else selectedFilters[key] = selectedFilters[key].filter(v => v !== val);
            updateDashboard();
        }

        function getMetaConfig() {
            let c = selectedFilters.courses.length === 1 ? selectedFilters.courses[0].toLowerCase() : null;
            let r = selectedFilters.roles.length === 1 ? selectedFilters.roles[0].toLowerCase() : null;
            let def = { verde: 80, amarelo: 60, minFcp: null };
            let padrao = baseMetas.find(m => String(m['Curso']).toLowerCase().includes('padr')) || {};
            let match = baseMetas.find(m => String(m['Curso']).toLowerCase() === c && (String(m['Cargo']).toLowerCase() === r || !m['Cargo'] || m['Cargo'] === 'Todos'));
            let active = match || padrao || def;
            return {
                verde: Number(active['Verde_Acima_De']) || 80,
                amarelo: Number(active['Amarelo_Acima_De']) || 60,
                minFcp: active['Minimo_Por_FCP'] ? Number(active['Minimo_Por_FCP']) : null
            };
        }

        function applySemaforo(cardId, textId, metaId, val, cfg) {
            let card = document.getElementById(cardId), txt = document.getElementById(textId), lbl = document.getElementById(metaId);
            card.classList.remove('glow-red', 'border-green-500', 'border-amber-500', 'border-red-500');
            txt.classList.remove('semaforo-verde', 'semaforo-amarelo', 'semaforo-vermelho');
            lbl.innerText = `Meta: >${cfg.verde}%`; lbl.classList.remove('hidden');
            if(val >= cfg.verde) { txt.classList.add('semaforo-verde'); card.classList.add('border-green-500'); }
            else if(val >= cfg.amarelo) { txt.classList.add('semaforo-amarelo'); card.classList.add('border-amber-500'); }
            else { txt.classList.add('semaforo-vermelho'); card.classList.add('border-red-500', 'glow-red'); }
        }

        function calculateKPIs() {
            let cfg = getMetaConfig();
            let isHybrid = cfg.minFcp > 0;
            document.getElementById('metaAtivaLabel').classList.toggle('hidden', !isHybrid);
            document.getElementById('lblTotalStaff').innerText = isHybrid ? "Total FCPs" : "Total Staff";

            let validStaff = new Set(), validFcps = new Set();
            baseStaff.forEach(s => {
                let r = s['Role At FCP'] || s['Role at FCP'] || 'Não Identificado';
                if(selectedFilters.roles.length === 0 || selectedFilters.roles.includes(r)) {
                    validStaff.add(String(s['Email']).toLowerCase().trim()); validFcps.add(s['FCP ID']);
                }
            });

            let completedEmails = new Set(), fcpCompletions = {}, userCourse = {};
            currentFilteredData.forEach(d => {
                let em = d.Email_Lower, fcp = d[cols.staffFcp], st = String(d[cols.status]).toLowerCase();
                if(st.includes('completed')) {
                    completedEmails.add(em);
                    if(!fcpCompletions[fcp]) fcpCompletions[fcp] = new Set();
                    fcpCompletions[fcp].add(em);
                }
                let key = em + "|" + d[cols.course];
                if(!userCourse[key]) userCourse[key] = { c: st.includes('comp'), e: st.includes('enrol') };
            });

            let totalAlvo = isHybrid ? validFcps.size : validStaff.size;
            let concluidosAlvo = 0;
            if(isHybrid) {
                Object.keys(fcpCompletions).forEach(f => { if(fcpCompletions[f].size >= cfg.minFcp) concluidosAlvo++; });
            } else { concluidosAlvo = completedEmails.size; }

            let cov = totalAlvo > 0 ? Math.round((concluidosAlvo / totalAlvo) * 100) : 0;
            document.getElementById('kpiTotalStaff').innerText = totalAlvo;
            document.getElementById('kpiCoverage').innerText = cov + '%';
            applySemaforo('cardKpiCoverage', 'kpiCoverage', 'kpiCoverageMeta', cov, cfg);

            let cR = 0, dR = 0;
            Object.values(userCourse).forEach(v => { if(v.c) cR++; else if(v.e) dR++; });
            let ef = (cR + dR) > 0 ? Math.round((cR / (cR + dR)) * 100) : 0;
            document.getElementById('kpiTotal').innerText = (cR + dR);
            document.getElementById('kpiRate').innerText = ef + '%';
            applySemaforo('cardKpiRate', 'kpiRate', 'kpiRateMeta', ef, cfg);
        }

        function updateDashboard() {
            let s = document.getElementById('dateStart').value, e = document.getElementById('dateEnd').value;
            let dS = s ? new Date(s) : null, dE = e ? new Date(e) : null;
            currentFilteredData = joinedData.filter(d => {
                let rD = d[cols.date] ? new Date(d[cols.date]) : null;
                return (!dS || rD >= dS) && (!dE || rD <= dE) &&
                       (selectedFilters.courses.length === 0 || selectedFilters.courses.includes(d[cols.course])) &&
                       (selectedFilters.roles.length === 0 || selectedFilters.roles.includes(d[cols.staffRole])) &&
                       (selectedFilters.facs.length === 0 || selectedFilters.facs.includes(d[cols.fac]));
            });

            calculateKPIs();
            updateCharts();
            renderTable();

            // Update button texts
            ['Course', 'Fac', 'Role'].forEach(k => {
                let count = selectedFilters[k.toLowerCase() + 's'].length;
                document.getElementById('btn' + k).innerText = count > 0 ? `Selecionados (${count})` : "Selecionar...";
            });
        }

        function updateCharts() {
            const isDark = document.documentElement.classList.contains('dark'), tColor = isDark ? '#cbd5e1' : '#475569';
            const scaleCfg = { x: { ticks:{color:tColor}, grid:{display:false} }, y: { ticks:{color:tColor}, grid:{display:false} } };

            // Top Cursos
            let courses = {};
            currentFilteredData.forEach(d => { if(String(d[cols.status]).toLowerCase().includes('comp')) courses[d[cols.course]] = (courses[d[cols.course]]||0)+1; });
            let sortedC = Object.entries(courses).sort((a,b)=>b[1]-a[1]).slice(0,5);
            updateChart('chartCourses', 'bar', {
                labels: sortedC.map(i => i[0].substring(0,20)+'...'),
                datasets: [{ label: 'Concluídos', data: sortedC.map(i=>i[1]), backgroundColor: '#8b5cf6', borderRadius: 4 }]
            }, { indexAxis:'y', plugins:{legend:{display:false}}, scales: scaleCfg });

            // Facilitadores
            let facs = {};
            currentFilteredData.forEach(d => { if(String(d[cols.status]).toLowerCase().includes('comp')) facs[d[cols.fac]] = (facs[d[cols.fac]]||0)+1; });
            let sortedF = Object.entries(facs).sort((a,b)=>b[1]-a[1]).slice(0,5);
            updateChart('chartFacilitadores', 'bar', {
                labels: sortedF.map(i => i[0].substring(0,20)),
                datasets: [{ label: 'Concluídos', data: sortedF.map(i=>i[1]), backgroundColor: '#10b981', borderRadius: 4 }]
            }, { indexAxis:'y', plugins:{legend:{display:false}}, scales: scaleCfg });
        }

        function updateChart(id, type, data, options) {
            if(charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), { type, data, options: {...options, maintainAspectRatio:false} });
        }

        function renderTable() {
            let search = document.getElementById('tableSearch').value.toLowerCase();
            let html = currentFilteredData.filter(d => 
                d.NameDisplay.toLowerCase().includes(search) || d[cols.staffFcp].toLowerCase().includes(search)
            ).slice(0,50).map(row => `
                <tr><td>${row[cols.staffFcp]}</td><td>${row.NameDisplay}</td><td>${row[cols.staffRole]}</td><td>${row[cols.course]}</td><td>${row[cols.status]}</td><td>${row[cols.date]}</td></tr>
            `).join('');
            document.getElementById('tableBody').innerHTML = html;
        }

        function toggleHelpModal() { document.getElementById('helpModal').classList.toggle('hidden'); }
    </script>
</body>
</html>
